<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Brief Generator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0e0c;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --accent: #c8401a;
    --accent2: #2a5c45;
    --muted: #8a8478;
    --border: #d4cfc4;
    --card: #faf7f2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 60px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    margin-bottom: 56px;
    animation: fadeUp 0.6s ease both;
  }

  .label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(36px, 6vw, 56px);
    line-height: 1.05;
    color: var(--ink);
    margin-bottom: 16px;
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .subtitle {
    font-size: 16px;
    color: var(--muted);
    font-weight: 300;
    line-height: 1.6;
    max-width: 480px;
  }

  /* Input card */
  .input-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 32px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.1s ease both;
    box-shadow: 0 2px 12px rgba(15,14,12,0.06);
  }

  .input-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: block;
  }

  textarea {
    width: 100%;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--ink);
    resize: vertical;
    min-height: 140px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  textarea::placeholder { color: var(--muted); }
  textarea:focus { border-color: var(--accent); }

  .examples {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .example-chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
  }

  .example-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,64,26,0.04);
  }

  /* Generate button */
  .btn {
    width: 100%;
    padding: 18px 32px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 20px;
    position: relative;
    overflow: hidden;
  }

  .btn:hover { background: var(--accent); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn:disabled:hover { background: var(--ink); }

  .btn-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(245,240,232,0.3);
    border-top-color: var(--paper);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .btn.loading .spinner { display: block; }
  .btn.loading .btn-text { opacity: 0.7; }

  /* Output */
  #output {
    display: none;
    animation: fadeUp 0.5s ease both;
  }

  .brief-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 2px solid var(--ink);
    gap: 16px;
    flex-wrap: wrap;
  }

  .brief-title-area {}

  .brief-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .brief-title {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    line-height: 1.2;
  }

  .brief-actions {
    display: flex;
    gap: 8px;
  }

  .btn-sm {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-sm:hover {
    border-color: var(--ink);
    color: var(--ink);
  }

  .btn-sm.primary {
    background: var(--accent2);
    color: white;
    border-color: var(--accent2);
  }

  .btn-sm.primary:hover {
    background: #1e4433;
    border-color: #1e4433;
    color: white;
  }

  /* Brief sections */
  .section {
    margin-bottom: 32px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }

  .section:last-child {
    border-bottom: none;
    margin-bottom: 0;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .section-content {
    font-size: 15px;
    line-height: 1.7;
    color: var(--ink);
  }

  .section-content p { margin-bottom: 8px; }
  .section-content p:last-child { margin-bottom: 0; }

  .section-content ul {
    list-style: none;
    padding: 0;
  }

  .section-content ul li {
    padding: 8px 0 8px 20px;
    position: relative;
    border-bottom: 1px solid var(--cream);
    font-size: 14px;
    line-height: 1.6;
  }

  .section-content ul li:last-child { border-bottom: none; }

  .section-content ul li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }

  .brief-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 36px;
    box-shadow: 0 2px 16px rgba(15,14,12,0.06);
  }

  .goal-box {
    background: var(--ink);
    color: var(--paper);
    padding: 20px 24px;
    border-radius: 3px;
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    font-style: italic;
    line-height: 1.5;
    margin-bottom: 4px;
  }

  /* Loading state */
  .loading-state {
    text-align: center;
    padding: 60px 20px;
    display: none;
  }

  .loading-state.active { display: block; }

  .loading-dots {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .loading-bar {
    width: 200px;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    margin: 20px auto 0;
    overflow: hidden;
  }

  .loading-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    animation: loadBar 2s ease-in-out infinite;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes loadBar {
    0% { width: 0%; margin-left: 0; }
    50% { width: 70%; margin-left: 15%; }
    100% { width: 0%; margin-left: 100%; }
  }

  @media print {
    body::before { display: none; }
    .input-card, .header .subtitle, .btn, .btn-sm, .brief-actions { display: none !important; }
    .brief-card { box-shadow: none; border: none; }
  }

  @media (max-width: 600px) {
    .container { padding: 40px 16px 60px; }
    .input-card { padding: 20px; }
    .brief-card { padding: 24px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="label">⚡ Hackathon Build · Meeting Brief Generator</div>
    <h1>Walk in<br><em>prepared.</em></h1>
    <p class="subtitle">Paste any meeting title or invite text. Get a sharp, structured brief in seconds.</p>
  </div>

  <div class="input-card">
    <label class="input-label" for="meetingInput">Meeting title or invite description</label>
    <textarea id="meetingInput" placeholder="e.g. Q2 budget review with CFO and eng leads&#10;&#10;Or paste the full invite text..."></textarea>

    <div class="examples">
      <span class="example-chip" onclick="fillExample('Q2 Budget Review with CFO and Engineering Leads')">Q2 Budget Review</span>
      <span class="example-chip" onclick="fillExample('1:1 Performance Review with my Manager')">Performance Review</span>
      <span class="example-chip" onclick="fillExample('Investor pitch prep call with Series A lead')">Investor Pitch Prep</span>
      <span class="example-chip" onclick="fillExample('New client onboarding call — SaaS product demo')">Client Onboarding</span>
    </div>

    <button class="btn" id="generateBtn" onclick="generateBrief()">
      <div class="btn-inner">
        <div class="spinner"></div>
        <span class="btn-text">Generate Meeting Brief</span>
      </div>
    </button>
  </div>

  <div class="loading-state" id="loadingState">
    <div class="loading-dots">Preparing your brief...</div>
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  </div>

  <div id="output">
    <div class="brief-card" id="briefCard"></div>
  </div>

</div>

<script>
function fillExample(text) {
  document.getElementById('meetingInput').value = text;
  document.getElementById('meetingInput').focus();
}

async function generateBrief() {
  const input = document.getElementById('meetingInput').value.trim();
  if (!input) {
    document.getElementById('meetingInput').focus();
    return;
  }

  const btn = document.getElementById('generateBtn');
  const loadingState = document.getElementById('loadingState');
  const output = document.getElementById('output');

  btn.disabled = true;
  btn.classList.add('loading');
  btn.querySelector('.btn-text').textContent = 'Generating...';
  loadingState.classList.add('active');
  output.style.display = 'none';

  const systemPrompt = `You are an expert executive assistant who creates precise, actionable meeting briefs.

Given a meeting title or description, generate a structured brief with EXACTLY these 5 sections. Respond ONLY in valid JSON, no markdown, no backticks, no preamble.

{
  "meetingTitle": "clean title derived from input",
  "goal": "One crisp sentence: the single most important outcome of this meeting",
  "attendees": [
    "Name/Role: their likely agenda or motivation (be specific and insightful)"
  ],
  "questions": [
    "Smart, specific question to ask (not generic)"
  ],
  "context": "2-3 sentences of background context, industry norms, or political dynamics to be aware of",
  "talkingPoints": [
    "Concrete talking point or position to prepare"
  ]
}

Rules:
- attendees: 2-4 items based on what's mentioned or implied
- questions: exactly 4 smart questions  
- talkingPoints: exactly 3-4 punchy points
- Be specific, not generic. Sound like a seasoned operator, not a consultant.
- No fluff. Every word earns its place.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: `Meeting: ${input}` }]
      })
    });

    const data = await response.json();
    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const brief = JSON.parse(clean);
    renderBrief(brief, input);

  } catch (err) {
    document.getElementById('briefCard').innerHTML = `
      <div style="text-align:center;padding:40px;color:var(--muted);">
        <div style="font-family:'DM Mono',monospace;font-size:12px;margin-bottom:8px;">ERROR</div>
        <div>Could not generate brief. Check your connection and try again.</div>
        <div style="font-size:12px;margin-top:8px;color:var(--accent)">${err.message}</div>
      </div>`;
    output.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.querySelector('.btn-text').textContent = 'Generate Meeting Brief';
    loadingState.classList.remove('active');
  }
}

function renderBrief(brief, originalInput) {
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });

  const attendeesHtml = brief.attendees.map(a => `<li>${a}</li>`).join('');
  const questionsHtml = brief.questions.map(q => `<li>${q}</li>`).join('');
  const talkingHtml = brief.talkingPoints.map(t => `<li>${t}</li>`).join('');

  document.getElementById('briefCard').innerHTML = `
    <div class="brief-header">
      <div class="brief-title-area">
        <div class="brief-meta">MEETING BRIEF · ${dateStr}</div>
        <div class="brief-title">${brief.meetingTitle}</div>
      </div>
      <div class="brief-actions">
        <button class="btn-sm" onclick="window.print()">Print</button>
        <button class="btn-sm primary" onclick="copyBrief()">Copy</button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">01 · Meeting Goal</div>
      <div class="goal-box">${brief.goal}</div>
    </div>

    <div class="section">
      <div class="section-label">02 · Key Attendees & Their Agenda</div>
      <div class="section-content"><ul>${attendeesHtml}</ul></div>
    </div>

    <div class="section">
      <div class="section-label">03 · Smart Questions to Ask</div>
      <div class="section-content"><ul>${questionsHtml}</ul></div>
    </div>

    <div class="section">
      <div class="section-label">04 · Background Context</div>
      <div class="section-content"><p>${brief.context}</p></div>
    </div>

    <div class="section">
      <div class="section-label">05 · Your Talking Points</div>
      <div class="section-content"><ul>${talkingHtml}</ul></div>
    </div>
  `;

  const output = document.getElementById('output');
  output.style.display = 'block';
  output.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyBrief() {
  const card = document.getElementById('briefCard');
  const text = card.innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}
</script>
</body>
</html>
